name: Generate Stats Images

on:
  schedule:
    - cron: '0 0 * * *'          # runs daily
  workflow_dispatch:             # allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch stats image
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=amirhossein103&show_icons=true&theme=tokyonight&hide_border=true&count_private=true" -o stats.svg

      - name: Fetch top languages image
        run: |
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=amirhossein103&layout=compact&theme=tokyonight&hide_border=true" -o langs.svg

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add stats.svg langs.svg
          git commit -m "🔄 Auto-update stats images" || echo "No changes to commit"
          git push